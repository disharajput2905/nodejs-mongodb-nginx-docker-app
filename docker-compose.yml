services:
  
  node-app:
    build: .
    container_name: node-container
    ports:
      - "3000:3000"

    depends_on:
       - mongo 


  mongo:
    image: mongo    
    container_name: mongo-container
    
    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

volumes:
   mongo-data:  

