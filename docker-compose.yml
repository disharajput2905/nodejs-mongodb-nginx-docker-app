services:

  nginx:
    image: nginx
    container_name: nginx-container

    ports:
      - "8080:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - node-app

  node-app:
    build: .
    container_name: node-container

    expose:
      - "3000"

    depends_on:
      - mongo

  mongo:
    image: mongo
    container_name: mongo-container

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
